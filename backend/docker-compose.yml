version: '3.8'

services:
  backend:
    build: .
    ports:
      - '3000:3000'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3000
      - CACHE_SEARCH_TTL_MS=900000
      - CACHE_DETAIL_TTL_MS=1800000
      - ENCAR_QUEUE_CONCURRENCY=8
      - ENCAR_REQUEST_DELAY_MS=300
      - BROWSER_POOL_SIZE=3
      - KRW_TO_USD_RATE=1350
      - CORS_ORIGIN=http://localhost:5173,http://localhost:3000,https://dibayo07.github.io,https://13.63.165.49.nip.io
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis_data:
